<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crossword Puzzle</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f6f6f6;
}

#container{
position:relative;
display:inline-block;
}

#puzzle{
display:block;
}

#canvas{
position:absolute;
left:0;
top:0;
touch-action:none;
}

#wordlist{
margin-top:20px;
max-width:600px;
margin-left:auto;
margin-right:auto;
font-size:18px;
}

.word{
display:inline-block;
margin:6px 10px;
padding:4px 8px;
border-radius:6px;
background:white;
}

.found{
text-decoration:line-through;
background:#c8f7c5;
}

#message{
font-size:30px;
color:green;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Crossword Puzzle</h1>

<div id="container">
<img id="puzzle" src="crossword.png">
<canvas id="canvas"></canvas>
</div>

<div id="wordlist"></div>

<div id="message"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const img=document.getElementById("puzzle");

img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
}

let drawing=false;
let currentLine=[];
let lines=[];

const wordsData = WORD_COORDS; // automatically inserted by Python

const wordListDiv=document.getElementById("wordlist");

wordsData.forEach(w=>{
const span=document.createElement("span");
span.className="word";
span.id="word-"+w.name;
span.innerText=w.name;
wordListDiv.appendChild(span);
});


function getPos(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){
return {
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
}
}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
}

}


canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",moveDraw);
canvas.addEventListener("mouseup",endDraw);

canvas.addEventListener("touchstart",startDraw);
canvas.addEventListener("touchmove",moveDraw);
canvas.addEventListener("touchend",endDraw);


function startDraw(e){
drawing=true;
currentLine=[getPos(e)];
}

function moveDraw(e){

if(!drawing) return;

currentLine.push(getPos(e));
draw();

}

function endDraw(){

drawing=false;
lines.push(currentLine);
checkWords();

}


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.lineWidth=5;
ctx.strokeStyle="red";

for(let line of lines){

ctx.beginPath();
ctx.moveTo(line[0].x,line[0].y);

for(let p of line){
ctx.lineTo(p.x,p.y);
}

ctx.stroke();

}

if(currentLine.length>0){

ctx.beginPath();
ctx.moveTo(currentLine[0].x,currentLine[0].y);

for(let p of currentLine){
ctx.lineTo(p.x,p.y);
}

ctx.stroke();

}

}


function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}


function highlightWord(word){

ctx.lineWidth=12;
ctx.strokeStyle="rgba(0,200,0,0.5)";

ctx.beginPath();
ctx.moveTo(word.start.x,word.start.y);
ctx.lineTo(word.end.x,word.end.y);
ctx.stroke();

}


function checkWords(){

const tolerance=35;

for(let word of wordsData){

if(word.found) continue;

const start={x:word.start.x,y:word.start.y};
const end={x:word.end.x,y:word.end.y};

for(let line of lines){

const s=line[0];
const e=line[line.length-1];

const forward=
dist(s,start)<tolerance &&
dist(e,end)<tolerance;

const reverse=
dist(s,end)<tolerance &&
dist(e,start)<tolerance;

if(forward||reverse){

word.found=true;

highlightWord(word);

document.getElementById("word-"+word.name).classList.add("found");

}

}

}

if(wordsData.every(w=>w.found)){

document.getElementById("message").innerText="🎉 Complete! Well done!";

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

}

}

</script>

</body>
</html>
