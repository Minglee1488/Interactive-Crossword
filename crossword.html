
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crossword Puzzle</title>

<style>
body{text-align:center;font-family:Arial}
canvas{position:absolute;left:0;top:0}
#container{position:relative;display:inline-block}
#message{font-size:28px;color:green;margin-top:20px}
</style>

</head>

<body>

<h1>Crossword Puzzle</h1>

<div id="container">
<img id="puzzle" src="crossword.png">
<canvas id="canvas"></canvas>
</div>

<div id="message"></div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const img=document.getElementById("puzzle");

img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
}

let drawing=false;
let lines=[];
let current=[];

const words=[[(3, 0), (3, 1), (3, 2), (3, 3), (3, 4), (3, 5), (3, 6)], [(14, 10), (14, 11), (14, 12), (14, 13), (14, 14)], [(2, 0), (2, 1), (2, 2), (2, 3), (2, 4), (2, 5), (2, 6), (2, 7), (2, 8), (2, 9), (2, 10)], [(3, 5), (4, 5), (5, 5), (6, 5), (7, 5), (8, 5), (9, 5), (10, 5), (11, 5), (12, 5), (13, 5), (14, 5)], [(6, 7), (7, 7), (8, 7), (9, 7), (10, 7), (11, 7), (12, 7), (13, 7), (14, 7)], [(1, 12), (2, 12), (3, 12), (4, 12), (5, 12), (6, 12), (7, 12), (8, 12), (9, 12)], [(1, 11), (2, 11), (3, 11), (4, 11), (5, 11), (6, 11), (7, 11), (8, 11), (9, 11), (10, 11), (11, 11), (12, 11)], [(0, 14), (1, 14), (2, 14), (3, 14), (4, 14), (5, 14), (6, 14), (7, 14), (8, 14), (9, 14), (10, 14), (11, 14)], [(5, 2), (6, 2), (7, 2), (8, 2), (9, 2), (10, 2), (11, 2), (12, 2), (13, 2)], [(6, 8), (7, 8), (8, 8), (9, 8), (10, 8), (11, 8), (12, 8)], [(4, 1), (5, 1), (6, 1), (7, 1), (8, 1), (9, 1), (10, 1), (11, 1), (12, 1), (13, 1), (14, 1)]];

function pos(e){
const r=canvas.getBoundingClientRect();
return {x:e.clientX-r.left,y:e.clientY-r.top}
}

canvas.onmousedown=e=>{drawing=true;current=[pos(e)]}
canvas.onmousemove=e=>{if(drawing){current.push(pos(e));draw()}}
canvas.onmouseup=e=>{drawing=false;lines.push(current);check()}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.lineWidth=4
ctx.strokeStyle="red"

for(let l of lines){
ctx.beginPath()
ctx.moveTo(l[0].x,l[0].y)
for(let p of l)ctx.lineTo(p.x,p.y)
ctx.stroke()
}

if(current.length>0){
ctx.beginPath()
ctx.moveTo(current[0].x,current[0].y)
for(let p of current)ctx.lineTo(p.x,p.y)
ctx.stroke()
}
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function check(){

let found=0

for(let w of words){

let start={x:w[0][0]*40+20,y:w[0][1]*40+20}
let end={x:w[w.length-1][0]*40+20,y:w[w.length-1][1]*40+20}

for(let l of lines){

let s=l[0]
let e=l[l.length-1]

if((dist(s,start)<30 && dist(e,end)<30) ||
(dist(s,end)<30 && dist(e,start)<30)) found++

}

}

if(found>=words.length)
document.getElementById("message").innerHTML="🎉 Complete! Well done!"

}

</script>

</body>
</html>
